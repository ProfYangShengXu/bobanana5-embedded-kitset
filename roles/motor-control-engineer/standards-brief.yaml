deliverables:
  output_types:
  - 固件/代码
  - 烧录文件(.hex/.bin)
  - 配置文件
  - 烧录说明文档
  quality_criteria:
  - 编译零警告
  - 硬件信号验证通过
  - 烧录步骤文档完备
  - 低功耗/实时性达标
meta:
  description: 电机控制工程师：FOC/PID/无刷电机驱动、伺服控制、运动规划
  role_name: motor-control-engineer
pitfalls_and_risks:
  common_mistakes:
  - 引脚复用冲突未检查
  - 时钟配置错误导致外设异常
  - 忽略电源时序要求
  - 文档滞后于代码修改
profession_standards:
  summary: motor-control-engineer 职业准则
tools_and_methods:
  software:
  - ST MotorControl SDK
  - MC Workbench
  - MATLAB/Simulink
  - Oscilloscope
  - 对应MCU的IDE/工具链
  - Git + Git LFS
  workflow:
  - PRD审查→PWM生成验证→电流采样校准→FOC调参→效率测量→保护验证
  - 需求→方案→实现→编译→烧录→验证→文档
