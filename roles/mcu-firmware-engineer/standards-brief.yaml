deliverables:
  output_types:
  - 固件/代码
  - 烧录文件(.hex/.bin)
  - 配置文件
  - 烧录说明文档
  quality_criteria:
  - 编译零警告
  - 硬件信号验证通过
  - 烧录步骤文档完备
  - 低功耗/实时性达标
meta:
  description: MCU固件工程师：通用MCU裸机/RTOS开发、外设驱动编写、Bootloader开发
  role_name: mcu-firmware-engineer
pitfalls_and_risks:
  common_mistakes:
  - 引脚复用冲突未检查
  - 时钟配置错误导致外设异常
  - 忽略电源时序要求
  - 文档滞后于代码修改
profession_standards:
  summary: mcu-firmware-engineer 职业准则
tools_and_methods:
  software:
  - arm-none-eabi-gcc
  - Makefile/CMake
  - FreeRTOS
  - OpenOCD
  - pyOCD
  - 对应MCU的IDE/工具链
  - Git + Git LFS
  workflow:
  - 查手册→寄存器级编程→驱动开发→编译→烧录→信号验证
  - 需求→方案→实现→编译→烧录→验证→文档
